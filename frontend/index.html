<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSphere - Tus películas favoritas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            cinema: { dark: '#0f0f14', card: '#1a1a24', accent: '#e50914', gold: '#d4af37' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="bg-cinema-dark text-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-cinema-accent to-cinema-gold bg-clip-text text-transparent">
        CineSphere
      </h1>
      <p class="text-gray-400 mt-2 text-lg">Busca películas y guarda tus favoritas</p>
    </header>

    <!-- Search -->
    <section class="bg-cinema-card rounded-2xl p-6 shadow-xl mb-8">
      <label for="searchInput" class="block text-sm font-medium text-gray-400 mb-2">Buscar película</label>
      <div class="flex gap-2 flex-wrap">
        <input
          type="text"
          id="searchInput"
          placeholder="Ej: Inception, Matrix..."
          class="flex-1 min-w-[200px] px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-cinema-accent focus:border-transparent outline-none"
        />
        <button
          type="button"
          id="searchBtn"
          class="px-6 py-3 rounded-xl bg-cinema-accent hover:bg-red-600 font-semibold transition-colors"
        >
          Buscar
        </button>
      </div>
    </section>

    <!-- Feedback messages -->
    <div id="feedback" class="mb-6 hidden" role="alert"></div>

    <!-- Result card (single movie from search) -->
    <section id="resultSection" class="mb-10 hidden">
      <h2 class="text-xl font-semibold text-gray-300 mb-4">Resultado de búsqueda</h2>
      <div id="resultCard" class="bg-cinema-card rounded-2xl overflow-hidden shadow-xl max-w-md"></div>
      <!-- Optional notes before saving -->
      <div class="mt-4 max-w-md">
        <label for="notesInput" class="block text-sm text-gray-400 mb-1">Notas (opcional)</label>
        <input
          type="text"
          id="notesInput"
          placeholder="Ej: Quiero verla en el cine"
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-cinema-accent outline-none"
        />
        <button
          type="button"
          id="saveFavoriteBtn"
          class="mt-3 px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-medium transition-colors"
        >
          Guardar en favoritos
        </button>
      </div>
    </section>

    <!-- Favorites list -->
    <section class="bg-cinema-card rounded-2xl p-6 shadow-xl">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold text-gray-300">Mis favoritos</h2>
        <button
          type="button"
          id="refreshFavoritesBtn"
          class="px-3 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm transition-colors"
        >
          Actualizar lista
        </button>
      </div>
      <div id="favoritesList" class="space-y-4">
        <!-- Cards rendered by app.js -->
        <p id="favoritesEmpty" class="text-gray-500 py-4">Cargando favoritos...</p>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
