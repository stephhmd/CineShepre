<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSphere - Tus películas favoritas</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            cinema: {
              dark: '#0b0b10',
              card: '#161621',
              accent: '#e50914',
              gold: '#d4af37'
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top, #151522, #0b0b10 60%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>

<body class="text-gray-100 min-h-screen">

<!-- 🔐 PROTECCIÓN -->
<script>
window.onload = () => {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "/login.html";
  } else {
    try {
      const payload = JSON.parse(atob(token.split(".")[1]));
      document.getElementById("userText").innerText = "Hola, " + payload.sub;
    } catch {
      document.getElementById("userText").innerText = "Sesión activa 🎬";
    }
  }
};
</script>

<!-- NAV -->
<nav class="flex justify-between items-center px-6 py-4 glass">
  <h1 class="font-bold text-xl text-cinema-gold">CineSphere 🎬</h1>

  <div class="flex gap-3 items-center">
    <span id="userText" class="text-sm text-gray-300"></span>

    <button onclick="logout()" class="px-4 py-2 rounded-lg bg-red-700 hover:bg-red-600">
      Cerrar sesión
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="max-w-6xl mx-auto px-4 py-10">

  <header class="text-center mb-12">
    <h1 class="text-4xl font-bold text-cinema-gold">CineSphere 🎬</h1>
    <p class="text-gray-400 mt-2">Explora, guarda y organiza tus películas favoritas</p>
  </header>

  <!-- SEARCH -->
  <section class="glass rounded-2xl p-6 mb-10">
    <label class="block text-sm text-gray-400 mb-2">Buscar película</label>

    <div class="flex gap-3 flex-wrap">
      <input type="text" id="searchInput"
        class="flex-1 px-4 py-3 rounded-xl bg-black/40 border border-gray-700"
        placeholder="Ej: Spiderman..." />

      <button id="searchBtn"
        class="px-6 py-3 rounded-xl bg-cinema-accent hover:bg-red-600">
        Buscar
      </button>
    </div>
  </section>

  <div id="feedback" class="mb-6 hidden"></div>

  <!-- RESULT -->
  <section id="resultSection" class="mb-12 hidden">
    <div id="resultCard" class="glass rounded-xl p-4 max-w-md"></div>

    <input id="notesInput"
      class="mt-3 w-full px-4 py-2 rounded bg-black/40 border border-gray-700"
      placeholder="Notas..." />

    <button id="saveFavoriteBtn"
      class="mt-3 bg-green-600 px-4 py-2 rounded hover:bg-green-500">
      Guardar favorito
    </button>
  </section>

  <!-- FAVORITOS -->
  <section class="glass rounded-2xl p-6">
    <div class="flex justify-between mb-4">
      <h2 class="text-xl font-semibold">Mis favoritos</h2>
      <button id="refreshFavoritesBtn" class="text-gray-400">
        Actualizar
      </button>
    </div>

    <div id="favoritesList"></div>
    <p id="favoritesEmpty" class="text-gray-500">Sin favoritos aún</p>
  </section>

</div>

<script>
function logout(){
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}
</script>

<script src="app.js"></script>

</body>
</html>
