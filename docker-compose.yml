version: "3.9"

services:
  api:
    build: .
    container_name: cinesphere_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: cinesphere_frontend
    ports:
      - "80:80"
    depends_on:
      - api